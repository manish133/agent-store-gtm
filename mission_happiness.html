<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mission Happiness · Apparel Feedback Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#F6F7F9; --panel:#FFFFFF; --panel2:#FFF5F6; --line:#E6E6EB; --line2:#F0F0F4;
  --tx:#1F1F23; --mut:#6b6b73; --mut2:#9a9aa3;
  --gold:#C8102E; --gold-dim:#8B0E26;
  --lo:#C8102E; --mid:#B7791F; --hi:#1F9D55;
  --lo-d:#FBE9EC; --mid-d:#FFF7E6; --hi-d:#E6F4EA;
  --cyan:#8B0E26;
  --r:14px; --rs:10px;
  --shadow:0 1px 2px rgba(20,20,30,.04), 0 8px 24px rgba(20,20,30,.06);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:
    radial-gradient(ellipse 800px 600px at 10% 0%, rgba(200,16,46,0.04) 0%, transparent 60%),
    var(--ink) fixed;
  color:var(--tx); font-family:'Inter Tight',system-ui,sans-serif; font-size:14px; line-height:1.5;}
::selection{background:var(--gold);color:#fff}
h1,h2,h3,h4{font-family:'Fraunces',serif;font-weight:600;margin:0;letter-spacing:-.01em}
.mono{font-family:'JetBrains Mono',monospace}
.app{display:grid;grid-template-columns:268px 1fr;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:var(--cyan)}

/* ---------- Rail ---------- */
.rail{border-right:1px solid var(--line);background:linear-gradient(180deg,#FFFFFF,#F6F7F9);
  padding:22px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:18px}
.brand{display:flex;align-items:center;gap:11px}
.brand .dot{width:34px;height:34px;border-radius:9px;background:
  conic-gradient(from 220deg,var(--lo),var(--mid),var(--hi),var(--hi));
  box-shadow:0 0 0 1px #00000010, inset 0 0 12px #00000022;position:relative}
.brand .dot::after{content:"";position:absolute;inset:9px;border-radius:50%;background:var(--ink)}
.brand b{font-family:'Fraunces';font-weight:700;font-size:16px;letter-spacing:.01em;display:block;line-height:1.1}
.brand span{font-size:10.5px;color:var(--mut);letter-spacing:.14em;text-transform:uppercase}
.rail-lab{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut2);margin:6px 8px 2px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav button{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;text-align:left;
  color:var(--mut);width:100%;transition:.13s;font-size:13px;position:relative}
.nav button .ix{font-family:'JetBrains Mono';font-size:10.5px;color:var(--mut2);width:18px;flex:none}
.nav button .nm{flex:1}
.nav button .pip{width:7px;height:7px;border-radius:50%;background:transparent;flex:none}
.nav button:hover{background:#00000007;color:var(--tx)}
.nav button.on{background:linear-gradient(90deg,#C8102E18,transparent);color:var(--tx)}
.nav button.on .ix{color:var(--gold)}
.nav button.on::before{content:"";position:absolute;left:0;top:7px;bottom:7px;width:2.5px;border-radius:3px;background:var(--gold)}
.nav button.done .pip{background:var(--hi)}
.nav .sep{height:1px;background:var(--line);margin:6px 6px}
.rail-foot{margin-top:auto;font-size:11px;color:var(--mut2);line-height:1.5;border-top:1px solid var(--line);padding-top:14px}
.toggle{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--mut);cursor:pointer;user-select:none;margin-bottom:8px}
.toggle .sw{width:34px;height:19px;border-radius:20px;background:#D7D9E0;position:relative;transition:.15s;flex:none}
.toggle .sw::after{content:"";position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);top:2.5px;left:2.5px;transition:.15s}
.toggle.on .sw{background:var(--hi)}.toggle.on .sw::after{left:17px;background:#fff}

/* ---------- Stage ---------- */
.stage{padding:30px 38px 70px;max-width:1180px}
.crumb{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut2);margin-bottom:7px}
.crumb b{color:var(--gold);font-weight:600}
.h-row{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:8px}
.stage h1{font-size:27px}
.lede{color:var(--mut);max-width:640px;margin:6px 0 26px;font-size:13.5px}

.card{background:linear-gradient(180deg,var(--panel),#FBFBFD);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.pad{padding:18px 20px}
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.kpi{padding:14px 16px}
.kpi .k{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut2)}
.kpi .v{font-family:'Fraunces';font-size:25px;font-weight:600;margin-top:3px}
.kpi .s{font-size:11.5px;color:var(--mut);margin-top:1px}

.chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:3px 9px;border-radius:20px;
  border:1px solid var(--line2);color:var(--mut);font-family:'JetBrains Mono'}
.chip.lo{color:#B42318;border-color:#F4C6CC;background:var(--lo-d)}
.chip.mid{color:#B7791F;border-color:#F0E0B8;background:var(--mid-d)}
.chip.hi{color:#1F9D55;border-color:#C3E6CF;background:var(--hi-d)}

.btn{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#fff;font-weight:600;
  padding:10px 16px;border-radius:10px;font-size:13px;transition:.13s;box-shadow:0 6px 18px #C8102E30}
.btn:hover{filter:brightness(1.07)}.btn:disabled{opacity:.45;cursor:default;box-shadow:none}
.btn.ghost{background:#FFFFFF;color:var(--tx);border:1px solid var(--line);box-shadow:none}
.btn.ghost:hover{background:var(--line2)}
.btn.sm{padding:6px 12px;font-size:12px}

/* granularity tabs */
.gtabs{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.gtab{padding:7px 13px;border-radius:9px;border:1px solid var(--line);color:var(--mut);font-size:12.5px;transition:.12s}
.gtab:hover{color:var(--tx);border-color:var(--line2)}
.gtab.on{background:var(--panel2);color:var(--tx);border-color:var(--gold);box-shadow:inset 0 0 0 1px #C8102E40}

/* HI cards */
.hicards{grid-template-columns:repeat(auto-fill,minmax(238px,1fr))}
.hicard{padding:16px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:.14s;position:relative;overflow:hidden}
.hicard:hover{border-color:var(--line2);transform:translateY(-2px)}
.hicard .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.hicard .lab{font-weight:600;font-size:13.5px;line-height:1.25}
.hicard .meta{font-size:11px;color:var(--mut2);margin-top:2px}
.hicard .row{display:flex;align-items:center;gap:12px}
.hicard .delta{font-family:'JetBrains Mono';font-size:11.5px}
.up{color:var(--hi)}.down{color:var(--lo)}.flat{color:var(--mut)}
.hicard .pbar{display:flex;height:6px;border-radius:6px;overflow:hidden;background:#F0F0F4;border:1px solid var(--line)}
.hicard .deep{margin-top:auto;font-size:11.5px;color:var(--gold);display:flex;align-items:center;gap:6px;opacity:.0;transition:.14s}
.hicard:hover .deep{opacity:1}

.gauge-wrap{display:flex;align-items:center;gap:18px}
.empty{color:var(--mut2);font-size:13px;padding:30px;text-align:center}

/* pipeline */
.flow{display:flex;gap:0;margin:0 0 22px;flex-wrap:wrap}
.flow .step{display:flex;align-items:center;gap:9px;color:var(--mut2);font-size:12px}
.flow .step .n{font-family:'JetBrains Mono';width:22px;height:22px;border-radius:50%;border:1px solid var(--line2);
  display:grid;place-items:center;font-size:11px;flex:none}
.flow .step.act{color:var(--tx)}.flow .step.act .n{border-color:var(--gold);color:var(--gold)}
.flow .step.ok{color:var(--mut)}.flow .step.ok .n{border-color:var(--hi);color:var(--hi);background:var(--hi-d)}
.flow .arrow{width:26px;height:1px;background:var(--line2);margin:0 10px}

.agent{margin-bottom:16px}
.agent .ah{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line)}
.agent .ah .badge{font-family:'JetBrains Mono';font-size:11px;color:var(--gold);border:1px solid #F4C6CC;background:var(--panel2);
  padding:3px 8px;border-radius:7px;flex:none}
.agent .ah h3{font-size:15px}.agent .ah .sub{font-size:11.5px;color:var(--mut)}
.agent .ah .stat{margin-left:auto;font-size:11px;color:var(--mut2);display:flex;align-items:center;gap:7px}
.dotpulse{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.spin{width:13px;height:13px;border:2px solid #00000015;border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.theme,.cause,.rec{border:1px solid var(--line);border-radius:var(--rs);padding:13px 15px;margin-bottom:10px;background:var(--panel)}
.theme h4,.cause h4,.rec h4{font-size:13.5px;margin-bottom:4px}
.theme p,.cause p,.rec p{font-size:12.5px;color:var(--mut);margin:3px 0}
.quote{border-left:2px solid var(--line2);padding:4px 0 4px 11px;margin:7px 0;color:var(--mut);font-size:12px;font-style:italic}
.evid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.evid .e{font-family:'JetBrains Mono';font-size:10.5px;color:var(--mut);background:#F6F7F9;border:1px solid var(--line);padding:3px 8px;border-radius:6px}
.rec{border-left:3px solid var(--gold)}
.rec .imp{display:inline-block;font-family:'JetBrains Mono';font-size:11px;color:var(--hi);background:var(--hi-d);border:1px solid #C3E6CF;padding:2px 8px;border-radius:6px;margin-top:6px}
.rank{font-family:'JetBrains Mono';color:var(--gold);font-size:12px;margin-right:7px}

table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;color:var(--mut2);font-weight:500;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;padding:8px 10px;border-bottom:1px solid var(--line)}
td{padding:9px 10px;border-bottom:1px solid var(--line);color:var(--mut)}
tr:hover td{background:#F6F7F9}
td b{color:var(--tx);font-weight:600}

.bars{display:flex;flex-direction:column;gap:7px}
.bar{display:flex;align-items:center;gap:10px;font-size:12px}
.bar .lab{width:128px;color:var(--mut);flex:none;font-size:11.5px}
.bar .track{flex:1;height:9px;background:#F0F0F4;border:1px solid var(--line);border-radius:6px;overflow:hidden}
.bar .fill{height:100%;border-radius:6px}
.bar .val{width:42px;text-align:right;font-family:'JetBrains Mono';font-size:11px;color:var(--mut)}

.alert{display:flex;gap:13px;align-items:center;padding:14px 16px;border:1px solid var(--line);border-radius:var(--rs);margin-bottom:9px;background:var(--panel)}
.alert .ic{width:9px;align-self:stretch;border-radius:4px;flex:none}
.alert.critical .ic{background:var(--lo)}.alert.warning .ic{background:var(--mid)}
.alert .body{flex:1}.alert h4{font-size:13.5px}.alert p{font-size:12px;color:var(--mut);margin-top:2px}

.callrow{display:flex;align-items:center;gap:13px;padding:12px 15px;border:1px solid var(--line);border-radius:var(--rs);margin-bottom:8px;cursor:pointer;transition:.12s}
.callrow:hover{border-color:var(--line2);background:#F6F7F9}
.callrow.on{border-color:var(--gold);background:#C8102E10}
.callrow .av{width:34px;height:34px;border-radius:9px;background:var(--panel2);border:1px solid var(--line2);display:grid;place-items:center;font-family:'JetBrains Mono';font-size:12px;color:var(--mut);flex:none}

.script-line{padding:9px 13px;border-radius:9px;margin-bottom:7px;font-size:13px;max-width:82%}
.script-line.agent-l{background:var(--panel2);border:1px solid var(--line)}
.script-line.cust-l{background:#F0F4F8;border:1px solid #DCE3EC;margin-left:auto;color:#1F1F23}
.script-line .who{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut2);margin-bottom:3px}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel2);
  border:1px solid var(--line2);border-radius:11px;padding:12px 18px;font-size:13px;box-shadow:var(--shadow);
  opacity:0;transition:.25s;z-index:50;display:flex;align-items:center;gap:10px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .ok{color:var(--hi)}

.methgrid{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.meth{padding:15px 17px}.meth h4{color:var(--gold);font-size:12.5px;margin-bottom:6px}
.meth p{font-size:12.5px;color:var(--mut)}.meth code{font-family:'JetBrains Mono';font-size:11.5px;color:var(--cyan)}
.hidden{display:none}
.fade{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media(max-width:880px){.app{grid-template-columns:1fr}.rail{position:static;height:auto}.stage{padding:22px 18px}}
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="brand">
      <div class="dot"></div>
      <div><b>Mission Happiness</b><span>Feedback Intelligence</span></div>

    <div>
      <div class="rail-lab">Agent Pipeline</div>
      <nav class="nav" id="navMain"></nav>

  <main class="stage" id="stage"></main>
</div>

let GID=0;
const band=(hi)=>hi>=6.5?'hi':hi>=4.5?'mid':'lo';

function gauge(hi,size=92){
  const id='g'+(GID++); const cx=size/2, cy=size*0.86, R=size*0.40, w=size*0.11;
  const a0=Math.PI, a1=0; const v=(hi-1)/9; const ang=a0+(a1-a0)*v;
  const pt=(an,r)=>[cx+r*Math.cos(an), cy-r*Math.sin(an)];
  const arc=(s,e,r)=>{const[x1,y1]=pt(s,r),[x2,y2]=pt(e,r);return `M${x1} ${y1} A${r} ${r} 0 0 1 ${x2} ${y2}`;};
  const [nx,ny]=pt(ang,R-2);
  return `<svg width="${size}" height="${size*0.62}" viewBox="0 0 ${size} ${size*0.62}">
    <defs><linearGradient id="${id}" x1="0" x2="1"><stop offset="0" stop-color="#e5484d"/><stop offset=".5" stop-color="#e8a33d"/><stop offset="1" stop-color="#3fc28a"/></linearGradient></defs>
    <path d="${arc(a0,a1,R)}" stroke="#F0F0F4" stroke-width="${w+3}" fill="none" stroke-linecap="round"/>
    <path d="${arc(a0,a1,R)}" stroke="url(#${id})" stroke-width="${w}" fill="none" stroke-linecap="round" opacity=".9"/>
    <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="${hiCol(hi)}" stroke-width="${size*0.035}" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="${size*0.06}" fill="${hiCol(hi)}"/>
    <text x="${cx}" y="${cy-R*0.34}" text-anchor="middle" font-family='Fraunces' font-weight="700" font-size="${size*0.28}" fill="${hiCol(hi)}">${hi.toFixed(1)}</text>
  </svg>`;
}
function spark(trend,w=86,ht=26){
  const vals=trend.map(t=>t.hi); const mn=1,mx=10;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1))*w},${ht-((v-mn)/(mx-mn))*ht}`).join(' ');
  const last=trend[trend.length-1].hi;
  return `<svg width="${w}" height="${ht}" viewBox="0 0 ${w} ${ht}"><polyline points="${pts}" fill="none" stroke="${hiCol(last)}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${trend.map((t,i)=>`<circle cx="${(i/(vals.length-1))*w}" cy="${ht-((t.hi-mn)/(mx-mn))*ht}" r="2" fill="${hiCol(t.hi)}"/>`).join('')}</svg>`;
}
function pbar(n,nd){
  const tot=nd.prom+nd.pass+nd.detr||1;
  const seg=(c,v)=>v?`<div style="width:${v/tot*100}%;background:${c}"></div>`:'';
  return `<div class="pbar">${seg(col.hi,nd.prom)}${seg(col.mid,nd.pass)}${seg(col.lo,nd.detr)}</div>`;
}
function deltaTag(d){
  if(d>=0.3) return `<span class="delta up">▲ ${d.toFixed(1)} MoM</span>`;
  if(d<=-0.3) return `<span class="delta down">▼ ${Math.abs(d).toFixed(1)} MoM</span>`;
  return `<span class="delta flat">▬ ${d.toFixed(1)} MoM</span>`;
}

function matches(f,filt){
  return Object.entries(filt).every(([k,v])=>{
    const map={Region:'region',Department_Searched:'dept',Category_Searched:'cat',Subcategory_Searched:'sub',
      Topic_L1_Primary:'t1',Topic_L2_Primary:'t2',Store_ID:'store',Source_Channel:'channel'};
    return f[map[k]]===v;
  });
}
function buildBundle(){
  const nd=S.node;
  const rows=DATA.feedback.filter(f=>matches(f,nd.filter));
  // dominant context for joins
  const top=(arr)=>{const c={};arr.forEach(x=>{if(x)c[x]=(c[x]||0)+1});return Object.entries(c).sort((a,b)=>b[1]-a[1]);};
  const region=top(rows.map(r=>r.region))[0]?.[0];
  const dept=nd.filter.Department_Searched||top(rows.map(r=>r.dept))[0]?.[0];
  const cat=nd.filter.Category_Searched||top(rows.map(r=>r.cat))[0]?.[0];
  const sub=nd.filter.Subcategory_Searched||top(rows.map(r=>r.sub))[0]?.[0];
  const key=`${region}|${dept}|${cat}|${sub}`;
  const bundle={
    nd, rows,
    detractors:rows.filter(r=>r.nps<=6),
    region,dept,cat,sub,
    topTopics:top(rows.map(r=>r.t2)).slice(0,6),
    topReasons:top(rows.map(r=>r.reason)).slice(0,5),
    channels:top(rows.map(r=>r.channel)).slice(0,5),
    byStore:top(rows.map(r=>r.store)).slice(0,6),
    products:top(rows.map(r=>r.prod)).slice(0,5),
    invHeat:DATA.invHeat[key]||DATA.invHeat[`${region}|${dept}|${cat}|${sub}`]||null,
    invTrend:DATA.invTrend[key]||null,
    transfer:DATA.transfer[`${dept}|${sub}`]||null,
    staffing:DATA.staffing[region]||null,
    footfall:DATA.footfall[region]||null,
    signals:DATA.signals.filter(s=>s.region===region&&(!dept||s.dept===dept)&&(!cat||s.cat===cat)).slice(0,8),
    competitor:DATA.competitor.filter(c=>c.region===region).slice(0,6),
    key
  };
  S.bundle=bundle; return bundle;
}

/* ===================== Claude API plumbing ===================== */
async function callClaude(system,user){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
      system,messages:[{role:"user",content:user}]})});
  if(!res.ok) throw new Error("api "+res.status);
  const data=await res.json();
  const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  const clean=txt.replace(/```json/g,'').replace(/```/g,'').trim();
  return JSON.parse(clean);
}

  S.running=false; renderNav(); render();
}

async function runAgent3(){
  const b=S.bundle;
  const sample=b.rows.filter(r=>r.text).slice(0,40).map(r=>`[${r.store}/${r.npsCat}/${r.t2}] ${r.text}`).join("\n");
  if(S.liveAI){
    try{
      const sys="You are a retail CX conversation analyst. From customer feedback you identify the distinct themes customers are actually talking about, grounded in the text. Be specific about products (colour, fit, size) and store experience. Respond ONLY with JSON.";
      const usr=`Slice: ${b.nd.label}. ${b.rows.length} conversations, ${b.detractors.length} detractors. Top sub-topics: ${b.topTopics.map(t=>t[0]+'('+t[1]+')').join(', ')}.
Conversations:
${sample}

Return JSON: {"themes":[{"title":"short specific theme","share":"e.g. 28% of detractors","detail":"1 sentence what customers say","stores":"where it concentrates","quote":"one representative verbatim"}]} with 3-5 themes, most damaging first.`;
      const r=await callClaude(sys,usr);
      if(r.themes?.length){S.analysis.themes=r.themes;return;}
    }catch(e){S.analysis.mode='offline';}
  }
  S.analysis.themes=fallbackThemes(b);
}
function fallbackThemes(b){
  const themes=[]; const tot=b.detractors.length||b.rows.length;
  b.topTopics.slice(0,4).forEach(([t,c])=>{
    const ex=b.rows.find(r=>r.t2===t && r.text);
    const stores=Array.from(new Set(b.rows.filter(r=>r.t2===t).map(r=>r.store))).slice(0,3).join(', ');
    let detail=`Customers raise “${t}” repeatedly`;
    if(t==='Size Availability') detail='Requested sizes — often in specific colour/fit jeans — are not on shelf';
    if(t==='Assortment Variety') detail='The range feels thin; customers can’t find the style they came for';
    if(t==='Staff Availability') detail='Too few floor staff to assist, especially at peak hours';
    if(t==='Fit') detail='Fit (slim/relaxed) does not match expectations or is unavailable';
    themes.push({title:t,share:`${Math.round(c/tot*100)}% of conversations`,detail,stores,quote:ex?ex.text:''});
  });
  return themes;
}

async function runAgent4(){
  const b=S.bundle;
  const evidence=buildEvidenceText(b);
  if(S.liveAI && S.analysis.mode==='live'){
    try{
      const sys="You are a retail operations diagnostician. Given themes plus inventory, staffing, footfall, competitor and guided-analytics evidence, you state the underlying ROOT CAUSES (not symptoms) and tie each to specific numbers. Respond ONLY with JSON.";
      const usr=`Slice: ${b.nd.label}. Themes: ${JSON.stringify((S.analysis.themes||[]).map(t=>t.title))}.
Evidence:
${evidence}

Return JSON: {"causes":[{"cause":"root cause stated plainly","confidence":"High|Medium|Low","owner":"owning function","evidence":["fact with number","fact"],"theme":"which theme it explains"}]} 3-4 causes, highest confidence first.`;
      const r=await callClaude(sys,usr);
      if(r.causes?.length){S.analysis.causes=r.causes;return;}
    }catch(e){S.analysis.mode='offline';}
  }
  S.analysis.causes=fallbackCauses(b);
}
function buildEvidenceText(b){
  const L=[];
  if(b.invTrend) L.push(`Inventory stockout rate ${b.invTrend.map(t=>t.m+':'+pct(t.so)).join(' ')}.`);
  if(b.invHeat) L.push(`Worst colour/fit lines: ${b.invHeat.slice(0,5).map(x=>`${x.color} ${x.fit} ${pct(x.so)} stockout`).join('; ')}.`);
  if(b.staffing) L.push(`Floor staff ${b.staffing.map(s=>s.m+':'+s.floor).join(' ')}, staff-hours ${b.staffing.map(s=>s.m+':'+s.hours).join(' ')}.`);
  if(b.footfall) L.push(`Footfall conversion ${b.footfall.map(f=>f.m+':'+pct(f.conv)).join(' ')}.`);
  if(b.signals.length) L.push(`Guided signals: ${b.signals.map(s=>`${s.kpi} ${s.trend} (${s.cause}, ${s.conf})`).join('; ')}.`);
  if(b.competitor.length) L.push(`Competitor: ${b.competitor.slice(0,3).map(c=>`${c.comp} ${c.obs}`).join('; ')}.`);
  return L.join('\n');
}
function fallbackCauses(b){
  const c=[]; const topics=b.topTopics.map(t=>t[0]);
  const soUp = b.invTrend && b.invTrend[2].so>=0.25;
  const staffDown = b.staffing && b.staffing[2].floor < b.staffing[0].floor - 0.5;
  if(topics.includes('Size Availability')||soUp){
    c.push({cause:'Size & colour/fit availability gaps on fast-moving lines',confidence:soUp?'High':'Medium',owner:'Merchandising / Store Ops',
      theme:'Size Availability',evidence:[b.invTrend?`Stockout ${pct(b.invTrend[0].so)}→${pct(b.invTrend[2].so)}`:'recurring size complaints',b.invHeat?`${b.invHeat.length} colour/fit lines >0 stockout`:''].filter(Boolean)});
  }
  if(topics.includes('Assortment Variety')){
    c.push({cause:'Assortment too narrow for catchment demand',confidence:'Medium',owner:'Merchandising',theme:'Assortment Variety',
      evidence:[b.signals.find(s=>s.cause==='Assortment gap')?'Guided signal flags assortment gap':'thin-range mentions',`${b.products.length} distinct products searched`]});
  }
  if(topics.includes('Staff Availability')||staffDown){
    c.push({cause:'Floor-staff shortfall during peak traffic',confidence:staffDown?'High':'Medium',owner:'Store Ops / HR',theme:'Staff Availability',
      evidence:[b.staffing?`Floor staff ${b.staffing[0].floor}→${b.staffing[2].floor}`:'',b.staffing?`Staff-hours ${b.staffing[0].hours}→${b.staffing[2].hours}`:'',b.footfall?`Conversion ${pct(b.footfall[0].conv)}→${pct(b.footfall[2].conv)}`:''].filter(Boolean)});
  }
  if(b.competitor.length){
    c.push({cause:'Competitor pressure on price / assortment nearby',confidence:'Low',owner:'Marketing',theme:'Competitor',
      evidence:[`${b.competitor.length} competitor sightings in ${b.region}`,b.competitor[0]?esc(b.competitor[0].obs):'']});
  }
  return c.slice(0,4);
}

async function runAgent5(){
  const b=S.bundle;
  if(S.liveAI && S.analysis.mode==='live'){
    try{
      const sys="You are a retail action planner. You convert root causes into concrete, quantified recommendations a store/regional team can execute this week. Where stock can be moved, name source stores and an estimated impact. Respond ONLY with JSON.";
      const usr=`Slice: ${b.nd.label} (HI ${b.nd.hi}). Root causes: ${JSON.stringify(S.analysis.causes)}.
Transfer candidates (overstocked, slow): ${JSON.stringify(b.transfer||[])}.
Worst lines: ${JSON.stringify((b.invHeat||[]).slice(0,5))}.
Staffing: ${JSON.stringify(b.staffing)}.

Return JSON: {"recs":[{"action":"imperative action","owner":"role","impact":"quantified e.g. +5% category sales / +0.8 HI","detail":"how, naming source store if relevant","priority":"P1|P2|P3"}]} 3-5 actions, P1 first.`;
      const r=await callClaude(sys,usr);
      if(r.recs?.length){S.analysis.recs=r.recs;return;}
    }catch(e){S.analysis.mode='offline';}
  }
  S.analysis.recs=fallbackRecs(b);
}
function fallbackRecs(b){
  const r=[]; const causes=(S.analysis.causes||[]).map(c=>c.cause.toLowerCase());
  const worst=(b.invHeat||[])[0];
  if(causes.some(c=>c.includes('size')||c.includes('availability'))){
    const src=b.transfer?.[0];
    r.push({action:`Replenish the ${worst?worst.color+' '+worst.fit:'top'} ${esc(b.sub||'lines')} that keep selling out`,owner:'Merchandising Lead',
      priority:'P1',impact:'≈ +4–6% category sales recovery',
      detail:src?`Pull from ${src.store} (${src.region}) — ${src.stock} units sitting at ${src.cover} days cover with only ${src.sales} sold/wk. Redistribution beats reorder lead time.`:'Raise an emergency PO on the lines flagged >40% stockout.'});
  }
  if(causes.some(c=>c.includes('staff'))){
    r.push({action:'Add floor cover at peak hours and reset the rota',owner:'Store Manager',priority:'P1',
      impact:`≈ +${b.footfall?Math.max(2,Math.round((b.footfall[0].conv-b.footfall[2].conv)*100)):3} pts conversion`,
      detail:b.staffing?`Floor staff fell ${b.staffing[0].floor}→${b.staffing[2].floor} and hours ${b.staffing[0].hours}→${b.staffing[2].hours}; restore to the March baseline for the affected stores.`:'Restore staffing to baseline.'});
  }
  if(causes.some(c=>c.includes('assortment'))){
    r.push({action:'Brief a fast-fashion assortment top-up for this catchment',owner:'Category Buyer',priority:'P2',
      impact:'≈ +0.6 HI on the slice',detail:'Add depth on the styles customers searched but couldn’t find; trial in the 3 worst stores first.'});
  }
  if(causes.some(c=>c.includes('competitor'))){
    r.push({action:'Stand up a competitor price & assortment watch',owner:'Marketing',priority:'P3',
      impact:'protects share',detail:`Targeted at ${b.competitor[0]?esc(b.competitor[0].comp):'nearby rivals'} in ${b.region}.`});
  }
  r.push({action:'Close the loop with detractors who asked for resolution',owner:'CX / Call-Back Agent',priority:'P2',
    impact:`recover up to ${b.detractors.filter(d=>d.res&&d.res!=='No Resolution Needed').length} relationships`,
    detail:'Hand the flagged conversations to the Call-Back Centre once stock/staffing fixes land.'});
  return r.slice(0,5);
}

function agentShell(num,title,sub,statHtml,bodyHtml){
  return `<div class="card agent">

}
function statFor(stage){
  const a=S.analysis;
  if(!a) return '';
  const live=a.mode==='live';
  const ready={a3:a.themes,a4:a.causes,a5:a.recs}[stage];
  if(ready) return `<span style="color:var(--hi)">●</span> ${live?'Claude':'offline'} · complete`;
  if(S.running) return `<span class="spin"></span> reasoning…`;
  return `<span class="dotpulse"></span> queued`;
}
function pipelineHeader(active){
  const steps=[['3','Analyse'],['4','Root cause'],['5','Recommend']];
  return `<div class="flow">${steps.map((s,i)=>{
    const st=({3:S.analysis?.themes,4:S.analysis?.causes,5:S.analysis?.recs})[s[0]];

    return `<div class="step ${cls}"><span class="n">${st?'✓':s[0]}</span>${s[1]}</div>${i<2?'<span class="arrow"></span>':''}`;
  }).join('')}</div>`;
}

  const cHi=hiCol(nd.hi).replace('#','');
  P.defineSlideMaster({title:'M',background:{color:INK},objects:[
    {rect:{x:0,y:0,w:'100%',h:0.16,fill:{color:GOLD}}},

  s=P.addSlide({masterName:'M'});
  s.addText('What customers are talking about',{x:0.6,y:0.5,w:12,fontSize:24,bold:true,color:TX,fontFace:'Arial'});
  (a.themes||[]).slice(0,5).forEach((t,i)=>{
    const y=1.5+i*1.05;
    s.addText(`${t.title}`,{x:0.7,y,w:8,fontSize:15,bold:true,color:TX,fontFace:'Arial'});
    s.addText(t.share||'',{x:9.0,y,w:3.5,fontSize:12,color:cHi,align:'right',fontFace:'Arial'});

    s.addText(`${c.confidence} confidence · ${c.owner||''}`,{x:10.2,y,w:2.6,fontSize:11,color:GOLD,align:'right',fontFace:'Arial'});

  });
  // 4 recs
  s=P.addSlide({masterName:'M'});
  s.addText('The play — recommended actions',{x:0.6,y:0.5,w:12,fontSize:24,bold:true,color:TX,fontFace:'Arial'});
  const rows=[[{text:'Pri',options:{bold:true,color:GOLD}},{text:'Action',options:{bold:true,color:GOLD}},{text:'Owner',options:{bold:true,color:GOLD}},{text:'Expected impact',options:{bold:true,color:GOLD}}]];
  (a.recs||[]).forEach(r=>rows.push([

  const stage=$('#stage'); stage.className='stage fade';
  const q=DATA.callQueue;
  stage.innerHTML=`<div class="crumb">Always-on agent · <b>Call-Back Centre</b></div>
    <div class="h-row"><h1>Customer Call-Back Agent</h1></div>
    <p class="lede">Detractors who asked for resolution sit in this queue. Pick one and the agent drafts a personalised call-back — acknowledging their exact issue, confirming it’s being addressed, and inviting them back — then you can place the (simulated) call.</p>
    <div class="grid" style="grid-template-columns:340px 1fr;align-items:start;gap:18px">
      <div><div style="font-size:11px;color:var(--mut2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Queue · ${q.length} detractors</div><div id="cq" style="max-height:560px;overflow:auto;padding-right:4px"></div></div>
      <div id="callPane"></div>
    </div>`;
  const cq=$('#cq');
  q.slice(0,40).forEach(c=>{
    const row=h(`<div class="callrow ${S.activeCall===c.id?'on':''}">
      <div class="av">${esc((c.cust||'?').slice(-2))}</div>
      <div style="flex:1"><div style="font-size:13px;color:var(--tx)"><b>${esc(c.cust)}</b> · <span class="mono" style="font-size:11px;color:var(--mut)">NPS ${c.nps}</span></div>
        <div style="font-size:11.5px;color:var(--mut)">${esc(c.t2)} · ${esc(store(c.store).city||c.store)}</div></div>
      ${c.sev==='Critical'?'<span class="chip lo">crit</span>':''}</div>`);
    row.onclick=()=>{S.activeCall=c.id;render();};
    cq.appendChild(row);
  });
  renderCallPane();
}
function renderCallPane(){
  const pane=$('#callPane'); if(!pane) return;
  const c=DATA.callQueue.find(x=>x.id===S.activeCall);
  if(!c){pane.innerHTML='<div class="card pad empty">Select a customer from the queue.</div>';return;}
  const logged=S.callLog.find(l=>l.id===c.id);
  pane.innerHTML=`<div class="card">
    <div class="pad" style="border-bottom:1px solid var(--line);display:flex;align-items:center;gap:13px">
      <div class="av" style="width:42px;height:42px">${esc((c.cust||'?').slice(-2))}</div>
      <div><h3 style="font-size:15px">${esc(c.cust)}</h3><div style="font-size:12px;color:var(--mut)">${esc(c.phone)} · ${esc(store(c.store).name)} · ${esc(c.region)}</div></div>
      <div style="margin-left:auto" class="chip ${c.nps<=3?'lo':'mid'}">NPS ${c.nps}</div>
    </div>
    <div class="pad">
      <div style="font-size:11px;color:var(--mut2);text-transform:uppercase;letter-spacing:.1em">Their issue · ${esc(c.t1)} › ${esc(c.t2)}</div>
      <div class="quote" style="margin-top:6px">“${esc(c.text)}”</div>
      <div style="font-size:12px;color:var(--mut);margin-top:4px">Resolution requested: <b style="color:var(--tx)">${esc(c.res)}</b></div>
      <div id="scriptArea" style="margin-top:16px">${logged?renderTranscript(logged):''}</div>
      <div style="margin-top:16px;display:flex;gap:10px">
        ${logged?`<span class="chip hi">● Call logged · ${esc(logged.outcome)}</span>`:`<button class="btn" id="placeCall">📞 Generate &amp; place call-back</button>`}
      </div>
    </div></div>`;
  if(!logged){ $('#placeCall').onclick=()=>placeCall(c); }
}
function renderTranscript(l){
  return l.lines.map(ln=>`<div class="script-line ${ln.who==='Agent'?'agent-l':'cust-l'}"><div class="who">${ln.who}</div>${esc(ln.text)}</div>`).join('');
}
async function placeCall(c){
  const btn=$('#placeCall'); btn.disabled=true; btn.innerHTML='<span class="spin"></span> Drafting call…';
  let lines=null;
  if(S.liveAI){
    try{
      const sys="You are a warm, concise retail customer-care agent making an outbound call-back to a detractor. You acknowledge their specific issue, confirm what has been fixed, and warmly invite them back. Keep it human and brief. Respond ONLY with JSON.";
      const usr=`Customer ${c.cust} at ${store(c.store).name}. Their feedback: "${c.text}" (topic: ${c.t2}, NPS ${c.nps}). They asked for: ${c.res}.
Return JSON: {"lines":[{"who":"Agent"|"Customer","text":"..."}]} a realistic 6-8 line call: agent opens, references the exact issue, states it's been addressed, customer responds, agent invites them back with a small goodwill gesture, customer warms up, agent closes. Then add {"outcome":"Resolved"|"Follow-up scheduled"}.`;
      const r=await callClaude(sys,usr);
      if(r.lines?.length){lines=r.lines; var outcome=r.outcome||'Resolved';}
    }catch(e){}
  }
  if(!lines){ const fb=fallbackCall(c); lines=fb.lines; var outcome=fb.outcome; }
  // animate
  const area=$('#scriptArea'); area.innerHTML=''; btn.innerHTML='📞 Calling…';
  for(const ln of lines){
    await new Promise(r=>setTimeout(r,650));
    area.appendChild(h(`<div class="script-line ${ln.who==='Agent'?'agent-l':'cust-l'}"><div class="who">${esc(ln.who)}</div>${esc(ln.text)}</div>`));
    area.scrollIntoView({block:'end',behavior:'smooth'});
  }
  S.callLog.push({id:c.id,cust:c.cust,lines,outcome:outcome||'Resolved',when:new Date().toLocaleString()});
  toast(`Call-back complete · ${outcome||'Resolved'}`);
  renderCallPane();
}
function fallbackCall(c){
  const fix={'Replacement':'arranged a fresh replacement piece for you','Refund':'processed your refund in full',
    'Style Alternatives':'pulled a few alternatives in your size and colour','Call Back':'looked into it personally'}[c.res]||'sorted the issue out';
  return {outcome:'Resolved',lines:[
    {who:'Agent',text:`Hi ${c.cust}, this is Mission Happiness care calling from ${store(c.store).name}. Do you have a quick moment?`},
    {who:'Customer',text:`Oh — sure, go ahead.`},
    {who:'Agent',text:`You recently told us: “${c.text.slice(0,90)}${c.text.length>90?'…':''}”. I’m sorry that happened. I wanted to let you know we’ve ${fix}.`},
    {who:'Customer',text:`That’s good to hear, thanks for following up.`},
    {who:'Agent',text:`Of course. We’ve also fixed what caused it on our side. As a thank-you, there’s a small welcome-back offer waiting on your account.`},
    {who:'Customer',text:`Appreciate that — I’ll come by this weekend.`},
    {who:'Agent',text:`Wonderful, we’d love to see you. Thanks for giving us the chance to make it right.`},
  ]};
}

/* ===================== How it works ===================== */
function viewMethod(){
  const stage=$('#stage'); stage.className='stage fade';
  stage.innerHTML=`<div class="crumb">Reference · <b>How it works</b></div>
    <div class="h-row"><h1>The seven agents</h1></div>
    <p class="lede">A relay: deterministic agents do the maths and the joins; Claude-powered agents do the reading, the diagnosis and the conversation. Each hands a clean artifact to the next.</p>
    <div class="grid methgrid">
      ${meth('01 · Happiness Index','Deterministic','Converts conversation-level NPS into a 1–10 index at any granularity. <code>HI = 1 + 9·(NPS+100)/200</code>, clamped 1–10.')}
      ${meth('02 · Gather Evidence','Deterministic','Filters every conversation in the chosen slice and joins inventory, staffing, footfall, competitor & guided-analytics signals into one bundle.')}
      ${meth('03 · Analyse Conversations','Claude + fallback','Reads the verbatims and groups them into specific themes — product colour/fit/size, store moments — with representative quotes.')}
      ${meth('04 · Root-Cause Diagnosis','Claude + fallback','Tests each theme against the operational record to name root causes, not symptoms, each tied to numbers.')}
      ${meth('05 · Recommend Actions','Claude + fallback','Turns causes into a costed, owner-assigned play — including which store to move stock from — and exports a Huddle Prep deck.')}
      ${meth('◆ Trend Watch','Deterministic','Monitors HI month-on-month across all slices and raises ranked alerts the moment a segment slips.')}
      ${meth('◆ Call-Back Agent','Claude + fallback','Drafts and places a personalised call-back to each detractor who asked for resolution, confirming the fix and inviting them back.')}
    </div>
    <div class="card pad" style="margin-top:16px">
      <h3 style="font-size:14px;margin-bottom:6px">A worked example in the data</h3>
      <p style="color:var(--mut);font-size:13px">Deep-dive <b style="color:var(--tx)">Mens › Bottomwear</b> filtered to the East and you’ll trace the embedded story end-to-end: the index slid from <b>+18.8</b> in March to <b>−29</b> in May, driven by size/colour-fit stockouts and a real floor-staff cut (4.7→3.5), with overstocked stores nearby to redistribute from. That’s the journey from “light-blue slim-fit jeans aren’t there” to “pull units from the slow store and restore peak-hour cover.”</p>
    </div>`;
}
function meth(t,tag,p){return `<div class="card meth"><div style="display:flex;justify-content:space-between;align-items:baseline"><h4>${t}</h4></div><div class="chip ${tag.includes('Claude')?'mid':'hi'}" style="margin:2px 0 8px">${tag}</div><p>${p}</p></div>`;}

/* ===================== router ===================== */
function render(){
  ({a1:viewA1,a2:viewA2,a3:viewA3,a4:viewA4,a5:viewA5,huddle:viewHuddle,trend:viewTrend,calls:viewCalls,method:viewMethod}[S.view]||viewA1)();
}
$('#periodFoot').textContent='Data window · '+DATA.meta.period;
$('#aiToggle').onclick=()=>{S.liveAI=!S.liveAI;$('#aiToggle').classList.toggle('on',S.liveAI);
  $('#aiLabel').textContent=S.liveAI?'Live AI reasoning':'Offline reasoning';
  $('#aiStat').textContent=S.liveAI?'Agents 03–05 & calls reason live via Claude, with offline fallback.':'Agents run on built-in deterministic logic only.';};
renderNav(); render();
</script>
</body>
